publish:
  - "github"
productName: "Poe2 Price Checker"
npmRebuild: true
compression: normal
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js", "clicker.exe"]
  - from: "../renderer/dist"
    to: "."
  - "!node_modules/uiohook-napi/build${/*}"
  - "!node_modules/electron-overlay-window/build${/*}"
asarUnpack:
  - "**/clicker.exe"
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  target:
    - "nsis"
    - "portable"
linux:
  target:
    - "AppImage"
mac:
  target:
    - target: "dmg"
      arch:
        - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
    - "--sandbox"
